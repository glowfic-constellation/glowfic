name: jest

on:
  # Only run when JS-relevant files change. NB: if `jest` is ever made a
  # required status check, replace this with an always-run job that internally
  # skips the work (e.g. dorny/paths-filter), since a path-filtered required
  # check never reports on unrelated PRs and would block them. merge_group does
  # not support `paths`, so it always runs (correct for the merge queue).
  push:
    branches: [ main ]
    paths:
      - '**/*.js'
      - '.nvmrc'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/jest.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.js'
      - '.nvmrc'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/jest.yml'
  merge_group:

# Cancel an in-progress run when a newer commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: jest suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test
