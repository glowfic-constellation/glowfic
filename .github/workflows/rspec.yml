# For more information see:
# - https://docs.github.com/en/actions/guides/building-and-testing-ruby
# - https://github.com/niclin/rails-github-actions-example/blob/master/.github/workflows/rails.yml

name: rspec

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:

jobs:
  test:
    name: rspec suite
    runs-on: ubuntu-latest

    services:
      postgres:
        # reference: https://github.com/actions/example-services/blob/master/.github/workflows/postgres-service.yml
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glowfic_test
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: glowfic_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        # reference: https://docs.github.com/en/actions/guides/creating-redis-service-containers#running-jobs-in-containers
        image: redis:7.2
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      GLOWFIC_DATABASE_USER: postgres
      GLOWFIC_DATABASE_PASS: postgres
      GLOWFIC_DATABASE_PORT: 5432
      RAILS_ENV: test
      MINIO_ENDPOINT: http://localhost:9000/
      MINIO_ENDPOINT_EXTERNAL: http://localhost:9000/
      # Run the suite across this many parallel_tests workers (ubuntu-latest = 4 vCPUs).
      PARALLEL_TEST_PROCESSORS: 4

    steps:
      - uses: actions/checkout@v6
      - uses: browser-actions/setup-chrome@v2
      - name: Cache MinIO binary
        id: minio-cache
        uses: actions/cache@v5
        with:
          path: minio
          # bump the suffix to force a refresh of the cached binary
          key: ${{ runner.os }}-minio-v1
      - name: Set up MinIO
        run: |
          if [ ! -x ./minio ]; then
            wget --show-progress --progress=dot:mega https://dl.min.io/server/minio/release/linux-amd64/minio
            chmod +x minio
          fi
          MINIO_ROOT_USER=glowfic_minio MINIO_ROOT_PASSWORD=glowfic_minio ./minio server ./minio-data 2>&1 > minio.log &
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true  # runs bundle install (with version based on Gemfile.lock) and automatically caches result
      - name: Set up parallel test databases
        run: bundle exec rake parallel:create parallel:load_schema
      - name: Asset cache
        id: asset-cache
        uses: actions/cache@v5
        with:
          path: |
            public/assets
            tmp/cache/assets/sprockets
          key: ${{ runner.os }}-assets-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys:
            ${{ runner.os }}-assets-
      - name: Precompile assets
        # for faster server bootup for Capybara tests
        run: RAILS_ENV=test bundle exec rake assets:precompile
      - name: Cache parallel runtime log
        # lets parallel_tests balance workers by recorded per-file runtime
        uses: actions/cache@v5
        with:
          path: tmp/parallel_runtime_rspec.log
          key: ${{ runner.os }}-parallel-runtime-${{ github.run_id }}
          restore-keys:
            ${{ runner.os }}-parallel-runtime-
      - name: Run rspec tests in parallel
        # --runtime-log lets parallel_tests balance workers by recorded per-file
        # runtime once the cached log exists; the first run falls back to file
        # size and writes the log for next time.
        run: |
          echo "runner: nproc=$(nproc) mem=$(free -m | awk '/Mem:/{print $2"MB"}')"
          # TEMP: sample CPU/mem saturation during the test run
          vmstat 5 > /tmp/vmstat.log 2>&1 &
          VM=$!
          bundle exec parallel_rspec spec \
            --runtime-log tmp/parallel_runtime_rspec.log \
            -o '--format progress'
          RC=$?
          kill $VM 2>/dev/null || true
          echo "===== vmstat: r=runqueue b=blocked | free/cache KB | us=user sy=sys id=idle wa=iowait ====="
          cat /tmp/vmstat.log
          exit $RC
      - name: Merge coverage and enforce threshold
        # only when the suite passed: a failed worker doesn't flush its coverage,
        # which would make the merged total look (misleadingly) too low
        run: bundle exec rake coverage:report
      - name: Upload MinIO logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: minio-logs
          path: minio.log
      - name: Upload Coverage files
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
